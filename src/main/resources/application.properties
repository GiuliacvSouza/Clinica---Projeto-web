spring.application.name=ClinicaDentaria

# H2 DATABASE
## spring.datasource.url=jdbc:h2:mem:clinicadb
## spring.datasource.driverClassName=org.h2.Driver
## spring.datasource.username=sa
## spring.datasource.password=

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/bd.clinica
spring.datasource.username=postgres
spring.datasource.password=senha
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/init/postgresql.sql
spring.sql.init.separator=@@

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# H2 Console
## spring.h2.console.enabled=true
## spring.h2.console.path=/h2-console

# ── E-mail (SMTP) ────────────────────────────────────────────────────────────
# Configurar as variáveis de ambiente MAIL_USERNAME e MAIL_PASSWORD
# antes de iniciar a aplicação, nunca colocar credenciais aqui.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# ── URL base da aplicação (usar em links dos e-mails) ────────────────────────
app.base-url=http://localhost:8080
